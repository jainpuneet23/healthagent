services:
  - type: web
    name: healthagent-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: healthagent-db
          property: connectionString

  - type: worker
    name: healthagent-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: healthagent-db
          property: connectionString

databases:
  - name: healthagent-db
    plan: free
